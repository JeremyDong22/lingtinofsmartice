<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Clearing SW...</title></head>
<body>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    Promise.all(regs.map(r => r.unregister())).then(() => {
      document.body.innerText = '✅ Done (' + regs.length + ' SW removed). Redirecting...';
      setTimeout(() => { location.href = '/'; }, 500);
    });
  });
} else {
  location.href = '/';
}
</script>
<p>Clearing service workers...</p>
</body>
</html>
